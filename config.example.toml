repos = []

[harness]
default = "claude-code"
model = "claude-sonnet-4-6"
# reasoning_effort = "low"
timeout_secs = 1800

[github]
passphrase_protected = false

[daemon]
poll_interval_secs = 30
max_poll_interval_secs = 300
mode = "poll"
webhook_port = 3847
max_concurrent_reviews = 2

[defaults]
auto_review = true
review_drafts = false
max_files = 50
max_diff_lines = 3000
max_file_size_bytes = 100000
bot_name = "pr-reviewer"
dry_run = false
max_prompt_bytes = 204800

[instruction_prs]
enabled = false
mode = "conservative" # conservative | broad
min_distinct_prs = 2
branch_prefix = "pr-reviewer/agents-guardrail"

[serve]
enabled = false

# Example per-repo opt-in:
# [[repos]]
# owner = "your-org"
# name = "your-repo"
