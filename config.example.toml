# [[repos]]
# owner = "your-org"
# name = "your-repo"
# local_path = "/path/to/local/clone"
# harness = "claude-code"
# model = "claude-sonnet-4-6"
# fork_policy = "ignore"
# ignore_paths = ["*.lock", "vendor/**"]
# gitnexus = true

[harness]
default = "claude-code"
model = "claude-sonnet-4-6"
timeout_secs = 600

[github]

[daemon]
poll_interval_secs = 30
max_poll_interval_secs = 300
mode = "poll"
webhook_port = 3847
max_concurrent_reviews = 2

[defaults]
auto_review = true
review_drafts = false
max_files = 50
max_diff_lines = 3000
max_file_size_bytes = 100000
bot_name = "pr-reviewer"
dry_run = false
max_prompt_bytes = 204800
